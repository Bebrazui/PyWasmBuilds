name: Build C-Extension WASM

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-c-extension.yml'
      - 'c-extensions/**'

env:
  WASI_SDK_VERSION: "24"
  CPYTHON_VERSION: "v3.13.0"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache wasi-sdk
        id: cache-wasi
        uses: actions/cache@v4
        with:
          path: /opt/wasi-sdk
          key: wasi-sdk-${{ env.WASI_SDK_VERSION }}-linux-x86_64

      - name: Download wasi-sdk
        if: steps.cache-wasi.outputs.cache-hit != 'true'
        run: |
          URL="https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux.tar.gz"
          wget -q "$URL" -O /tmp/wasi-sdk.tar.gz
          sudo tar -xzf /tmp/wasi-sdk.tar.gz -C /opt
          sudo mv /opt/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux /opt/wasi-sdk

      - name: Cache CPython source
        id: cache-cpython-src
        uses: actions/cache@v4
        with:
          path: /tmp/cpython-src.tar
          key: cpython-src-tar-${{ env.CPYTHON_VERSION }}

      - name: Clone CPython
        if: steps.cache-cpython-src.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.CPYTHON_VERSION }} \
            https://github.com/python/cpython.git /tmp/cpython-clean
          tar -cf /tmp/cpython-src.tar -C /tmp cpython-clean

      - name: Extract CPython source
        run: |
          tar -xf /tmp/cpython-src.tar -C /tmp
          mv /tmp/cpython-clean /tmp/cpython

      - name: Build host Python to get pyconfig.h
        run: |
          cd /tmp/cpython
          ./configure --prefix=/tmp/cpython-host 2>/dev/null
          make -j$(nproc) python 2>/dev/null
          PYCONFIG=$(find /tmp/cpython -name "pyconfig.h" | head -1)
          echo "pyconfig.h: $PYCONFIG"
          echo "PYCONFIG_DIR=$(dirname $PYCONFIG)" >> $GITHUB_ENV

      - name: Compile C extensions to WASM
        run: |
          mkdir -p /tmp/ext-build

          for src in c-extensions/*.c; do
            name=$(basename "$src" .c)
            echo "Compiling $name..."
            /opt/wasi-sdk/bin/clang \
              --target=wasm32-wasi \
              --sysroot=/opt/wasi-sdk/share/wasi-sysroot \
              -I/tmp/cpython/Include \
              -I/tmp/cpython/Include/cpython \
              -I${{ env.PYCONFIG_DIR }} \
              -DPy_BUILD_CORE_BUILTIN=1 \
              -O2 \
              -shared \
              -Wl,--no-entry \
              -Wl,--export=PyInit_${name} \
              -o /tmp/ext-build/${name}.wasm \
              "$src" && echo "OK: ${name}.wasm" || echo "FAILED: $name"
          done

          ls -lh /tmp/ext-build/

      - name: Upload extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: c-extensions-wasm
          path: /tmp/ext-build/*.wasm
          retention-days: 30

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "cpython-wasm-v3.13.0"
          files: /tmp/ext-build/*.wasm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
