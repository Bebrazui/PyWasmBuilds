name: Build CPython WASM (wasm32-wasi)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-cpython-wasm.yml'

env:
  WASI_SDK_VERSION: "24"
  CPYTHON_VERSION: "v3.13.0"
  RELEASE_TAG: "cpython-wasm-v3.13.0"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. System dependencies (apt cache) ──────────────────────────────────
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-build-deps-v1

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libssl-dev zlib1g-dev libbz2-dev \
            libreadline-dev libsqlite3-dev libffi-dev \
            curl wget git xz-utils zip

      # ── 2. wasi-sdk (cached) ─────────────────────────────────────────────────
      - name: Cache wasi-sdk
        id: cache-wasi
        uses: actions/cache@v4
        with:
          path: /opt/wasi-sdk
          key: wasi-sdk-${{ env.WASI_SDK_VERSION }}-linux-x86_64

      - name: Download wasi-sdk
        if: steps.cache-wasi.outputs.cache-hit != 'true'
        run: |
          URL="https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux.tar.gz"
          echo "Downloading wasi-sdk ${WASI_SDK_VERSION}..."
          wget -q "$URL" -O /tmp/wasi-sdk.tar.gz
          sudo tar -xzf /tmp/wasi-sdk.tar.gz -C /opt
          sudo mv /opt/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux /opt/wasi-sdk

      - name: Setup wasi-sdk env
        run: |
          echo "WASI_SDK_PATH=/opt/wasi-sdk" >> $GITHUB_ENV
          echo "/opt/wasi-sdk/bin" >> $GITHUB_PATH
          echo "wasi-sdk: $(/opt/wasi-sdk/bin/clang --version | head -1)"

      # ── 3. Host Python ───────────────────────────────────────────────────────
      - name: Set up host Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # ── 4. CPython source (cached — source only, no build artifacts) ───────────
      - name: Cache CPython source
        id: cache-cpython-src
        uses: actions/cache@v4
        with:
          path: /tmp/cpython-src.tar
          key: cpython-src-tar-${{ env.CPYTHON_VERSION }}

      - name: Clone CPython
        if: steps.cache-cpython-src.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.CPYTHON_VERSION }} \
            https://github.com/python/cpython.git /tmp/cpython-clean
          # Save clean source as tar for caching (no build artifacts)
          tar -cf /tmp/cpython-src.tar -C /tmp cpython-clean
          echo "Cloned and archived: $(cat /tmp/cpython-clean/Misc/python-version)"

      - name: Extract CPython source
        run: |
          tar -xf /tmp/cpython-src.tar -C /tmp
          mv /tmp/cpython-clean /tmp/cpython
          echo "Source ready: $(cat /tmp/cpython/Misc/python-version)"

      # ── 5. Host Python build (cached separately) ─────────────────────────────
      - name: Cache host Python build
        id: cache-host-python
        uses: actions/cache@v4
        with:
          path: /tmp/cpython-host
          key: cpython-host-${{ env.CPYTHON_VERSION }}-ubuntu22

      - name: Build host Python
        if: steps.cache-host-python.outputs.cache-hit != 'true'
        working-directory: /tmp/cpython
        run: |
          ./configure --prefix=/tmp/cpython-host
          make -j$(nproc) python
          make install
          echo "Host Python: $(/tmp/cpython-host/bin/python3 --version)"

      # ── 6. Install wasmtime + clean source tree ──────────────────────────────
      - name: Cache wasmtime
        id: cache-wasmtime
        uses: actions/cache@v4
        with:
          path: ~/.wasmtime
          key: wasmtime-v25-linux-x86_64

      - name: Install wasmtime
        if: steps.cache-wasmtime.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://wasmtime.dev/install.sh | bash
          echo "wasmtime: $(~/.wasmtime/bin/wasmtime --version)"

      - name: Add wasmtime to PATH
        run: echo "$HOME/.wasmtime/bin" >> $GITHUB_PATH

      - name: Clean source tree for WASM build
        working-directory: /tmp/cpython
        run: |
          # wasi.py requires a clean source tree (no .o files from host build)
          git clean -fdx -e Doc/venv
          echo "Source tree cleaned"

      # ── 7. Build CPython WASM via wasi.py ────────────────────────────────────
      - name: Build CPython WASM via wasi.py
        working-directory: /tmp/cpython
        run: |
          export WASI_SDK_PATH=/opt/wasi-sdk

          echo "=== configure-build-python ==="
          python3 Tools/wasm/wasi.py configure-build-python

          echo "=== make-build-python ==="
          python3 Tools/wasm/wasi.py make-build-python

          echo "=== configure-host (with dynamic export flags) ==="
          # Patch wasi.py to add --export-dynamic to linker flags
          # This allows C-extensions to link against Python C API at runtime
          python3 -c "
import re, sys
with open('Tools/wasm/wasi.py', 'r') as f:
    src = f.read()
# Add --export-dynamic to the configure call for host
# Find the configure call and add LDFLAGS
old = 'configure,\n'
new = 'configure,\n'
# Instead, patch the env_additions to include LDFLAGS
src = src.replace(
    'env_additions | wasi_sdk_env(context)',
    'env_additions | wasi_sdk_env(context) | {\"LDFLAGS\": \"-Wl,--export-dynamic\"}'
)
with open('Tools/wasm/wasi.py', 'w') as f:
    f.write(src)
print('Patched wasi.py')
"
          WASI_SDK_PATH=/opt/wasi-sdk \
          python3 Tools/wasm/wasi.py configure-host

          echo "=== make-host ==="
          python3 Tools/wasm/wasi.py make-host 2>&1 | tail -50

          echo "=== .wasm files ==="
          find /tmp/cpython -name "*.wasm" -ls 2>/dev/null || echo "No .wasm found"

          echo "=== Check exports ==="
          WASM=$(find /tmp/cpython -name "*.wasm" | head -1)
          if [ -n "$WASM" ]; then
            /opt/wasi-sdk/bin/llvm-nm "$WASM" 2>/dev/null | grep -c "^[0-9a-f]* T Py" || echo "0 Py* exports"
          fi

      # ── 8. Package artifacts ─────────────────────────────────────────────────
      - name: Package artifacts
        run: |
          mkdir -p /tmp/wasm-dist

          # Find python.wasm — check all known output locations
          for candidate in \
            /tmp/cpython/python.wasm \
            /tmp/cpython/Programs/python.wasm \
            /tmp/cpython/cross-build/wasm32-wasi/python.wasm \
            /tmp/cpython/cross-build/wasm32-wasi/Programs/python.wasm \
            /tmp/cpython-wasm/bin/python3.wasm \
            /tmp/cpython-wasm/python.wasm; do
            if [ -f "$candidate" ]; then
              echo "Found python.wasm at: $candidate ($(du -sh $candidate | cut -f1))"
              cp "$candidate" /tmp/wasm-dist/python.wasm
              break
            fi
          done

          # Fallback: find any .wasm
          if [ ! -f /tmp/wasm-dist/python.wasm ]; then
            FOUND=$(find /tmp/cpython /tmp/cpython-wasm -name "*.wasm" 2>/dev/null | head -1)
            if [ -n "$FOUND" ]; then
              echo "Fallback: copying $FOUND"
              cp "$FOUND" /tmp/wasm-dist/python.wasm
            else
              echo "ERROR: No .wasm file found anywhere!"
              exit 1
            fi
          fi

          # Package stdlib
          cd /tmp/cpython
          zip -r /tmp/wasm-dist/python313-stdlib.zip Lib/ \
            --exclude "Lib/test/*" \
            --exclude "Lib/__pycache__/*" \
            --exclude "Lib/*/test/*" \
            --exclude "Lib/*/tests/*"

          echo "=== Dist contents ==="
          ls -lh /tmp/wasm-dist/

      # ── 9. Upload artifacts ──────────────────────────────────────────────────
      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cpython-wasm-wasi
          path: /tmp/wasm-dist/
          retention-days: 30

      # ── 10. Summary ──────────────────────────────────────────────────────────
      - name: Build summary
        run: |
          echo "## CPython WASM Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for f in /tmp/wasm-dist/*; do
            echo "| $(basename $f) | $(du -sh $f | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          done

      # ── 11. Create/update GitHub Release ─────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "CPython ${{ env.CPYTHON_VERSION }} WASM (wasm32-wasi)"
          body: |
            ## CPython ${{ env.CPYTHON_VERSION }} compiled to WebAssembly

            Built with wasi-sdk ${{ env.WASI_SDK_VERSION }} targeting `wasm32-wasi`.

            ### Files
            - `python.wasm` — CPython interpreter (~28 MB)
            - `python313-stdlib.zip` — Python standard library (~5 MB)

            ### Usage with cpython-wasm npm package
            ```js
            import { PythonRuntime } from 'cpython-wasm';
            const py = new PythonRuntime(); // auto-loads from this release
            await py.init();
            await py.run('print("Hello!")');
            ```
          files: |
            /tmp/wasm-dist/python.wasm
            /tmp/wasm-dist/python313-stdlib.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
