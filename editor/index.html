<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Python WASM Editor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --accent: #58a6ff;
      --accent-dim: #1f6feb;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --text: #e6edf3;
      --text-dim: #8b949e;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 15px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #3572A5 0%, #58a6ff 100%);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--yellow);
      animation: pulse 1.5s infinite;
    }

    .status-dot.ready { background: var(--green); animation: none; }
    .status-dot.error { background: var(--red); animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .header-spacer { flex: 1; }

    .btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn:hover { background: rgba(255,255,255,0.06); border-color: var(--accent); }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-run {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    .btn-run:hover { background: var(--accent); }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr auto;
      gap: 0;
      overflow: hidden;
    }

    /* ── Editor pane ── */
    .editor-pane {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .pane-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .pane-header span { font-weight: 500; color: var(--text); }

    #editor {
      flex: 1;
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.6;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
      border: none;
      outline: none;
      resize: none;
      tab-size: 4;
      overflow: auto;
    }

    /* ── Output pane ── */
    .output-pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #output {
      flex: 1;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.6;
      padding: 16px;
      background: var(--bg);
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .output-line { display: block; }
    .output-line.stdout { color: var(--text); }
    .output-line.stderr { color: var(--red); }
    .output-line.result { color: var(--accent); }
    .output-line.info   { color: var(--text-dim); font-style: italic; }
    .output-line.success { color: var(--green); }
    .output-line.error  { color: var(--red); font-weight: 600; }

    /* ── Status bar ── */
    .statusbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 4px 12px;
      background: var(--accent-dim);
      font-size: 11px;
      color: rgba(255,255,255,0.85);
      flex-shrink: 0;
    }

    #statusbar-text { flex: 1; }

    /* ── Loading overlay ── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(13,17,23,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 100;
      backdrop-filter: blur(4px);
    }

    #loading-overlay.hidden { display: none; }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { color: var(--text-dim); font-size: 14px; }
    .loading-sub  { color: var(--text-dim); font-size: 12px; opacity: 0.6; }

    /* ── Examples ── */
    .examples {
      display: flex;
      gap: 6px;
      padding: 0 4px;
    }

    .example-btn {
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .example-btn:hover { color: var(--text); border-color: var(--accent); }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">Loading Python runtime…</div>
  <div class="loading-sub">Downloading Pyodide (CPython 3.12 WASM) ~10 MB</div>
</div>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-icon">🐍</div>
    Python WASM Editor
  </div>

  <div class="status-badge">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Loading…</span>
  </div>

  <div class="header-spacer"></div>

  <div class="examples">
    <button class="example-btn" onclick="loadExample('hello')">Hello</button>
    <button class="example-btn" onclick="loadExample('fibonacci')">Fibonacci</button>
    <button class="example-btn" onclick="loadExample('files')">Files</button>
    <button class="example-btn" onclick="loadExample('numpy')">NumPy</button>
  </div>

  <button class="btn" onclick="clearOutput()">Clear</button>
  <button class="btn btn-run" id="run-btn" onclick="runCode()" disabled>
    ▶ Run
  </button>
</header>

<!-- Main -->
<main>
  <!-- Editor -->
  <div class="editor-pane">
    <div class="pane-header">
      📄 <span>main.py</span>
      <span style="margin-left:auto;font-size:11px">Ctrl+Enter to run</span>
    </div>
    <textarea id="editor" spellcheck="false">print("Hello from Python WASM! 🐍")

# Try some Python
import sys
print(f"Python {sys.version}")

# Math
result = sum(i**2 for i in range(10))
print(f"Sum of squares 0-9: {result}")

# List comprehension
words = ["wasm", "python", "browser"]
upper = [w.upper() for w in words]
print(f"Uppercase: {upper}")
</textarea>
  </div>

  <!-- Output -->
  <div class="output-pane">
    <div class="pane-header">
      💻 <span>Output</span>
      <span id="exec-time" style="margin-left:auto;font-size:11px"></span>
    </div>
    <div id="output"></div>
  </div>

  <!-- Status bar -->
  <div class="statusbar">
    <span id="statusbar-text">Initializing…</span>
    <span id="memory-info"></span>
  </div>
</main>

<!-- Pyodide -->
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js"></script>
<script>
  let pyodide = null;
  let running = false;

  // ── Examples ──────────────────────────────────────────────────────────────
  const EXAMPLES = {
    hello: `print("Hello from Python WASM! 🐍")

import sys
print(f"Python {sys.version}")
print(f"Platform: {sys.platform}")
`,
    fibonacci: `def fibonacci(n):
    a, b = 0, 1
    result = []
    for _ in range(n):
        result.append(a)
        a, b = b, a + b
    return result

fibs = fibonacci(20)
print("Fibonacci sequence (20 terms):")
print(fibs)
print(f"\\nSum: {sum(fibs)}")
print(f"Golden ratio approx: {fibs[-1]/fibs[-2]:.6f}")
`,
    files: `import os

# Write a file
with open('/home/user/hello.txt', 'w') as f:
    f.write("Hello from Python WASM!\\n")
    f.write("This file lives in the virtual filesystem.\\n")

# Read it back
with open('/home/user/hello.txt', 'r') as f:
    content = f.read()

print("File contents:")
print(content)

# List directory
print("Files in /home/user/:")
for entry in os.listdir('/home/user'):
    print(f"  {entry}")
`,
    numpy: `import micropip
await micropip.install('numpy')
import numpy as np

# Create arrays
a = np.array([1, 2, 3, 4, 5], dtype=np.float64)
b = np.linspace(0, 1, 5)

print(f"Array a: {a}")
print(f"Array b: {b}")
print(f"Dot product: {np.dot(a, b):.4f}")

# Matrix operations
m = np.random.rand(3, 3)
print(f"\\nRandom 3x3 matrix:\\n{m.round(3)}")
print(f"Determinant: {np.linalg.det(m):.4f}")
print(f"Eigenvalues: {np.linalg.eigvals(m).round(3)}")
`
  };

  function loadExample(name) {
    document.getElementById('editor').value = EXAMPLES[name] || '';
  }

  // ── Output helpers ────────────────────────────────────────────────────────
  function appendOutput(text, cls = 'stdout') {
    const out = document.getElementById('output');
    const line = document.createElement('span');
    line.className = `output-line ${cls}`;
    line.textContent = text;
    out.appendChild(line);
    out.scrollTop = out.scrollHeight;
  }

  function clearOutput() {
    document.getElementById('output').innerHTML = '';
    document.getElementById('exec-time').textContent = '';
  }

  // ── Status helpers ────────────────────────────────────────────────────────
  function setStatus(text, state = 'loading') {
    document.getElementById('status-text').textContent = text;
    const dot = document.getElementById('status-dot');
    dot.className = 'status-dot ' + (state === 'ready' ? 'ready' : state === 'error' ? 'error' : '');
    document.getElementById('statusbar-text').textContent = text;
  }

  // ── Init Pyodide ──────────────────────────────────────────────────────────
  async function initPyodide() {
    try {
      setStatus('Loading Python WASM…');

      pyodide = await loadPyodide({
        stdout: (text) => appendOutput(text + '\n', 'stdout'),
        stderr: (text) => appendOutput(text + '\n', 'stderr'),
      });

      // Hide loading overlay
      document.getElementById('loading-overlay').classList.add('hidden');

      // Enable run button
      document.getElementById('run-btn').disabled = false;

      setStatus('Python 3.12 WASM ready', 'ready');

      // Show memory info
      updateMemoryInfo();

      appendOutput('Python WASM runtime ready ✓\n', 'success');
      appendOutput(`Python ${pyodide.runPython("import sys; sys.version")}\n`, 'info');
      appendOutput('─'.repeat(50) + '\n', 'info');

    } catch (err) {
      document.getElementById('loading-overlay').classList.add('hidden');
      setStatus('Failed to load runtime', 'error');
      appendOutput(`Error loading Python: ${err.message}\n`, 'error');
    }
  }

  function updateMemoryInfo() {
    if (!pyodide) return;
    try {
      const mem = performance.memory;
      if (mem) {
        const used = (mem.usedJSHeapSize / 1024 / 1024).toFixed(1);
        document.getElementById('memory-info').textContent = `Heap: ${used} MB`;
      }
    } catch {}
  }

  // ── Run code ──────────────────────────────────────────────────────────────
  async function runCode() {
    if (!pyodide || running) return;

    const code = document.getElementById('editor').value;
    if (!code.trim()) return;

    running = true;
    document.getElementById('run-btn').disabled = true;
    setStatus('Running…');

    const t0 = performance.now();

    try {
      // Check if code uses await (async Python via run_sync)
      const isAsync = code.includes('await ');

      if (isAsync) {
        // Wrap in async function for top-level await support
        await pyodide.runPythonAsync(code);
      } else {
        pyodide.runPython(code);
      }

      const elapsed = (performance.now() - t0).toFixed(1);
      document.getElementById('exec-time').textContent = `${elapsed}ms`;
      setStatus(`Done in ${elapsed}ms`, 'ready');

    } catch (err) {
      const elapsed = (performance.now() - t0).toFixed(1);
      appendOutput('\n' + err.message + '\n', 'stderr');
      document.getElementById('exec-time').textContent = `${elapsed}ms`;
      setStatus('Error', 'error');
    }

    running = false;
    document.getElementById('run-btn').disabled = false;
    updateMemoryInfo();
  }

  // ── Keyboard shortcut ─────────────────────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      runCode();
    }
  });

  // Tab key in editor
  document.getElementById('editor').addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const ta = e.target;
      const start = ta.selectionStart;
      const end = ta.selectionEnd;
      ta.value = ta.value.substring(0, start) + '    ' + ta.value.substring(end);
      ta.selectionStart = ta.selectionEnd = start + 4;
    }
  });

  // ── Start ─────────────────────────────────────────────────────────────────
  initPyodide();
</script>
</body>
</html>
