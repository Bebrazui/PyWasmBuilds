<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Python WASM Editor — Custom Runtime</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --accent: #58a6ff; --accent-dim: #1f6feb;
      --green: #3fb950; --red: #f85149; --yellow: #d29922;
      --text: #e6edf3; --text-dim: #8b949e;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    header { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .logo { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 15px; }
    .logo-icon { width: 28px; height: 28px; background: linear-gradient(135deg, #3572A5, #58a6ff); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .badge { display: flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; background: rgba(255,255,255,0.05); border: 1px solid var(--border); }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--yellow); }
    .dot.ready { background: var(--green); }
    .dot.error { background: var(--red); }
    .dot.loading { animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .spacer { flex: 1; }
    .btn { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; }
    .btn:hover { background: rgba(255,255,255,.06); border-color: var(--accent); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-run { background: var(--accent-dim); border-color: var(--accent); color: #fff; font-weight: 600; }
    .btn-run:hover:not(:disabled) { background: var(--accent); }
    .examples { display: flex; gap: 6px; }
    .ex { padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-size: 11px; cursor: pointer; transition: all .15s; }
    .ex:hover { color: var(--text); border-color: var(--accent); }

    main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr auto; overflow: hidden; }
    .pane { display: flex; flex-direction: column; overflow: hidden; }
    .pane + .pane { border-left: 1px solid var(--border); }
    .pane-header { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: var(--surface); border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text-dim); flex-shrink: 0; }
    .pane-header span { font-weight: 500; color: var(--text); }
    #editor { flex: 1; font-family: var(--font-mono); font-size: 14px; line-height: 1.6; padding: 16px; background: var(--bg); color: var(--text); border: none; outline: none; resize: none; tab-size: 4; }
    #output { flex: 1; font-family: var(--font-mono); font-size: 13px; line-height: 1.6; padding: 16px; background: var(--bg); overflow: auto; white-space: pre-wrap; word-break: break-word; }
    .out-stdout { color: var(--text); }
    .out-stderr { color: var(--red); }
    .out-info   { color: var(--text-dim); font-style: italic; }
    .out-ok     { color: var(--green); }
    .out-err    { color: var(--red); font-weight: 600; }

    .statusbar { grid-column: 1/-1; display: flex; align-items: center; gap: 16px; padding: 4px 12px; background: var(--accent-dim); font-size: 11px; color: rgba(255,255,255,.85); flex-shrink: 0; }

    #overlay { position: fixed; inset: 0; background: rgba(13,17,23,.92); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 100; backdrop-filter: blur(4px); }
    #overlay.hidden { display: none; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ov-title { color: var(--text); font-size: 16px; font-weight: 600; }
    .ov-sub   { color: var(--text-dim); font-size: 13px; }
  </style>
</head>
<body>

<div id="overlay">
  <div class="spinner"></div>
  <div class="ov-title">Loading Python WASM Runtime</div>
  <div class="ov-sub" id="ov-status">Initializing...</div>
</div>

<header>
  <div class="logo"><div class="logo-icon">🐍</div>Python WASM — Custom Runtime</div>
  <div class="badge"><div class="dot loading" id="dot"></div><span id="status-text">Loading...</span></div>
  <div class="spacer"></div>
  <div class="examples">
    <button class="ex" onclick="loadEx('hello')">Hello</button>
    <button class="ex" onclick="loadEx('fib')">Fibonacci</button>
    <button class="ex" onclick="loadEx('files')">Files</button>
    <button class="ex" onclick="loadEx('sys')">Sys info</button>
  </div>
  <button class="btn" onclick="clearOut()">Clear</button>
  <button class="btn btn-run" id="run-btn" onclick="runCode()" disabled>▶ Run</button>
</header>

<main>
  <div class="pane">
    <div class="pane-header">📄 <span>main.py</span><span style="margin-left:auto;font-size:11px">Ctrl+Enter</span></div>
    <textarea id="editor" spellcheck="false">print("Hello from our custom Python WASM! 🐍")

import sys
print(f"Python {sys.version}")
print(f"Platform: {sys.platform}")

# Math
result = sum(i**2 for i in range(10))
print(f"Sum of squares 0-9: {result}")
</textarea>
  </div>
  <div class="pane">
    <div class="pane-header">💻 <span>Output</span><span id="exec-time" style="margin-left:auto;font-size:11px"></span></div>
    <div id="output"></div>
  </div>
  <div class="statusbar">
    <span id="sb-text">Initializing custom Python WASM runtime...</span>
    <span id="sb-exports" style="margin-left:auto"></span>
  </div>
</main>

<script>
const EXAMPLES = {
  hello: `print("Hello from our custom Python WASM! 🐍")\n\nimport sys\nprint(f"Python {sys.version}")\nprint(f"Platform: {sys.platform}")\n`,
  fib: `def fib(n):\n    a, b = 0, 1\n    for _ in range(n):\n        yield a\n        a, b = b, a+b\n\nresult = list(fib(15))\nprint("Fibonacci:", result)\nprint("Sum:", sum(result))\n`,
  files: `import os\n\nwith open('/home/user/test.txt', 'w') as f:\n    f.write("Hello from Python WASM!\\n")\n\nwith open('/home/user/test.txt') as f:\n    print(f.read())\n\nprint("Files:", os.listdir('/home/user'))\n`,
  sys: `import sys\nprint("Version:", sys.version)\nprint("Platform:", sys.platform)\nprint("Path:", sys.path[:3])\nprint("Modules:", len(sys.modules))\n`,
};

function loadEx(name) { document.getElementById('editor').value = EXAMPLES[name] || ''; }

// ── Output ────────────────────────────────────────────────────────────────────
function out(text, cls) {
  const el = document.createElement('span');
  el.className = cls;
  el.textContent = text;
  document.getElementById('output').appendChild(el);
  document.getElementById('output').scrollTop = 9999;
}
function clearOut() {
  document.getElementById('output').innerHTML = '';
  document.getElementById('exec-time').textContent = '';
}

// ── Status ────────────────────────────────────────────────────────────────────
function setStatus(text, state) {
  document.getElementById('status-text').textContent = text;
  document.getElementById('sb-text').textContent = text;
  const dot = document.getElementById('dot');
  dot.className = 'dot ' + (state === 'ready' ? 'ready' : state === 'error' ? 'error' : 'loading');
  document.getElementById('ov-status').textContent = text;
}

// ── Worker ────────────────────────────────────────────────────────────────────
const worker = new Worker('./python-worker.js');
let reqId = 0;
const pending = new Map();

worker.onmessage = (e) => {
  const msg = e.data;
  if (msg.type === 'status') {
    setStatus(msg.text, 'loading');
  } else if (msg.type === 'ready') {
    document.getElementById('overlay').classList.add('hidden');
    document.getElementById('run-btn').disabled = false;
    setStatus('Python WASM ready ✓', 'ready');
    out('Custom Python WASM runtime ready ✓\n', 'out-ok');
    out('─'.repeat(50) + '\n', 'out-info');
  } else if (msg.type === 'stdout') {
    out(msg.data, 'out-stdout');
  } else if (msg.type === 'stderr') {
    out(msg.data, 'out-stderr');
  } else if (msg.type === 'result') {
    const p = pending.get(msg.id);
    if (p) { p.resolve(msg.value); pending.delete(msg.id); }
  } else if (msg.type === 'error') {
    const p = pending.get(msg.id);
    if (p) { p.reject(msg.error); pending.delete(msg.id); }
    else {
      // Init error
      document.getElementById('overlay').classList.add('hidden');
      setStatus('Error: ' + msg.error.message, 'error');
      out('ERROR: ' + msg.error.message + '\n', 'out-err');
      if (msg.error.traceback) out(msg.error.traceback + '\n', 'out-stderr');
      // Show available exports hint
      if (msg.error.message.includes('exports')) {
        document.getElementById('sb-exports').textContent = msg.error.message;
      }
    }
  }
};

function sendRun(code) {
  return new Promise((resolve, reject) => {
    const id = String(++reqId);
    pending.set(id, { resolve, reject });
    worker.postMessage({ type: 'run', id, code });
  });
}

// ── Run ───────────────────────────────────────────────────────────────────────
let running = false;
async function runCode() {
  if (running) return;
  const code = document.getElementById('editor').value;
  if (!code.trim()) return;
  running = true;
  document.getElementById('run-btn').disabled = true;
  setStatus('Running...', 'loading');
  const t0 = performance.now();
  try {
    await sendRun(code);
    const ms = (performance.now() - t0).toFixed(1);
    document.getElementById('exec-time').textContent = ms + 'ms';
    setStatus('Done in ' + ms + 'ms', 'ready');
  } catch (err) {
    const ms = (performance.now() - t0).toFixed(1);
    out('\n' + (err.type || 'Error') + ': ' + err.message + '\n', 'out-err');
    if (err.traceback) out(err.traceback + '\n', 'out-stderr');
    document.getElementById('exec-time').textContent = ms + 'ms';
    setStatus('Error', 'error');
  }
  running = false;
  document.getElementById('run-btn').disabled = false;
}

// ── Keyboard ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); runCode(); }
});
document.getElementById('editor').addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const t = e.target, s = t.selectionStart;
    t.value = t.value.slice(0, s) + '    ' + t.value.slice(t.selectionEnd);
    t.selectionStart = t.selectionEnd = s + 4;
  }
});
</script>
</body>
</html>
